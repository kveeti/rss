name: frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'

env:
  DIR: frontend
  DOCKERHUB_USERNAME: veetik
  DOCKERHUB_IMAGE: veetik/rss_frontend

jobs:
  build_and_push_docker_image:
    name: build and push docker image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
            # 1.28.1-alpine3.23-slim
            nginx_hash: sha256:2c71a793b50ad6d31b5259d2c987769303b0acd243ea16c2e7a88ad5e75f57cc
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            # 1.28.1-alpine3.23-slim
            nginx_hash: sha256:366f9af49d466b994e6f4a69c9c2ee9f8a10a2bea925e2737d510c377c220688
    defaults:
      run:
        working-directory: ${{ env.DIR }}
    steps:
      - name: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # 4.2.2

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - run: pnpm install

      - run: pnpm build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: setup docker
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # 3.6.0

      - name: setup buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # 3.10.0

      - name: login to dockerhub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # 3.4.0
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: generate metadata for docker image
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # 5.7.0
        id: meta
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=sha
            type=ref,event=pr

      - name: build and push docker image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # 6.18.0
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          context: ${{ env.DIR }}
          file: ${{ env.DIR }}/Dockerfile
          platforms: ${{ matrix.platform }}
          cache-from: type=registry,ref=${{ env.DOCKERHUB_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKERHUB_IMAGE }}:buildcache,mode=max
          build-args: |
            NGINX_IMAGE_HASH=${{ matrix.nginx_hash }}
